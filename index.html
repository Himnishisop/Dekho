<!DOCTYPE html>
<html>
<head>
  <title>Air Mouse Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial,sans-serif;
      text-align:center;
      overflow:hidden;
    }
    button{
      margin:10px 6px;
      padding:12px 18px;
      font-size:16px;
      border:none;
      border-radius:10px;
    }
    #info{
      font-size:18px;
      margin-top:10px;
    }
    #area{
      position:relative;
      width:100vw;
      height:75vh;
      background:#222;
      overflow:hidden;
      touch-action:none;
    }
    #dot{
      position:absolute;
      width:24px;
      height:24px;
      background:red;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }
  </style>
</head>
<body>

  <button onclick="startSensor()">Start</button>
  <button onclick="setCenter()">Set Current Center</button>
  <button onclick="resetDot()">Reset Dot</button>

  <div id="info">dx: 0 | dy: 0</div>

  <div id="area">
    <div id="dot"></div>
  </div>

  <script>
    let rawX = 0, rawY = 0;
    let smoothX = 0, smoothY = 0;

    // default slightly forward-tilted center
    let baseX = 0;
    let baseY = 3.0;

    let started = false;

    const alpha = 0.05;          // sensor smoothing
    const deadzone = 0.35;       // ignore tiny movements
    const speedFactor = 1.8;     // main speed
    const maxSpeed = 18;         // cap
    const friction = 0.88;       // lower = more stop, higher = more glide

    const dot = document.getElementById("dot");
    const info = document.getElementById("info");
    const area = document.getElementById("area");

    let posX = window.innerWidth / 2;
    let posY = window.innerHeight * 0.42;

    let velX = 0;
    let velY = 0;

    function startSensor(){
      if(started) return;
      started = true;

      if(typeof DeviceMotionEvent.requestPermission === "function"){
        DeviceMotionEvent.requestPermission().then(response => {
          if(response === "granted"){
            window.addEventListener("devicemotion", handleMotion);
          }
        }).catch(() => {
          alert("Permission denied");
        });
      } else {
        window.addEventListener("devicemotion", handleMotion);
      }

      requestAnimationFrame(loop);
    }

    function handleMotion(e){
      rawX = e.accelerationIncludingGravity.x || 0;
      rawY = e.accelerationIncludingGravity.y || 0;

      smoothX += (rawX - smoothX) * alpha;
      smoothY += (rawY - smoothY) * alpha;
    }

    function applyDeadzone(v){
      if(Math.abs(v) < deadzone) return 0;
      return v;
    }

    function clamp(val, min, max){
      return Math.max(min, Math.min(max, val));
    }

    function loop(){
      let dx = smoothX - baseX;
      let dy = smoothY - baseY;

      dx = applyDeadzone(dx);
      dy = applyDeadzone(dy);

      // tilt -> speed
      let targetVX = -dx * speedFactor;
      let targetVY = dy * speedFactor;

      targetVX = clamp(targetVX, -maxSpeed, maxSpeed);
      targetVY = clamp(targetVY, -maxSpeed, maxSpeed);

      // smooth velocity
      velX = velX * friction + targetVX * 0.18;
      velY = velY * friction + targetVY * 0.18;

      posX += velX;
      posY += velY;

      if(posX < 12){ posX = 12; velX = 0; }
      if(posX > area.clientWidth - 12){ posX = area.clientWidth - 12; velX = 0; }

      if(posY < 12){ posY = 12; velY = 0; }
      if(posY > area.clientHeight - 12){ posY = area.clientHeight - 12; velY = 0; }

      dot.style.left = posX + "px";
      dot.style.top = posY + "px";

      info.innerText =
        "dx: " + dx.toFixed(2) + " | dy: " + dy.toFixed(2);

      requestAnimationFrame(loop);
    }

    function setCenter(){
      baseX = smoothX;
      baseY = smoothY;
    }

    function resetDot(){
      posX = area.clientWidth / 2;
      posY = area.clientHeight / 2;
      velX = 0;
      velY = 0;
    }
  </script>

</body>
</html>
