<!DOCTYPE html>
<html>
<head>
  <title>Fake Gyro from Accelerometer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial,sans-serif;
      text-align:center;
      overflow:hidden;
    }
    button{
      margin:10px 6px;
      padding:12px 18px;
      font-size:16px;
      border:none;
      border-radius:10px;
    }
    #info{
      font-size:18px;
      margin-top:10px;
    }
    #area{
      position:relative;
      width:100vw;
      height:75vh;
      background:#222;
      overflow:hidden;
    }
    #center{
      position:absolute;
      width:14px;
      height:14px;
      background:white;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      opacity:0.5;
    }
    #dot{
      position:absolute;
      width:24px;
      height:24px;
      background:red;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }
  </style>
</head>
<body>

  <button onclick="startSensor()">Start</button>
  <button onclick="setCenter()">Set Center</button>

  <div id="info">x: 0 | y: 0</div>

  <div id="area">
    <div id="center"></div>
    <div id="dot"></div>
  </div>

  <script>
    let rawX = 0, rawY = 0;
    let smoothX = 0, smoothY = 0;
    let baseX = 0, baseY = 0;
    let started = false;

    const alpha = 0.12; // lower = smoother
    const sensitivity = 35;

    const dot = document.getElementById("dot");
    const info = document.getElementById("info");
    const area = document.getElementById("area");

    function startSensor(){
      if(started) return;
      started = true;

      if(typeof DeviceMotionEvent.requestPermission === "function"){
        DeviceMotionEvent.requestPermission().then(response => {
          if(response === "granted"){
            window.addEventListener("devicemotion", handleMotion);
          }
        }).catch(() => {
          alert("Permission denied");
        });
      } else {
        window.addEventListener("devicemotion", handleMotion);
      }
    }

    function handleMotion(e){
      rawX = e.accelerationIncludingGravity.x || 0;
      rawY = e.accelerationIncludingGravity.y || 0;

      // smooth like fake gyro feel
      smoothX = smoothX + (rawX - smoothX) * alpha;
      smoothY = smoothY + (rawY - smoothY) * alpha;

      let dx = smoothX - baseX;
      let dy = smoothY - baseY;

      info.innerText = "x: " + dx.toFixed(2) + " | y: " + dy.toFixed(2);

      let moveX = dx * sensitivity;
      let moveY = dy * sensitivity;

      let centerX = area.clientWidth / 2;
      let centerY = area.clientHeight / 2;

      let finalX = centerX + moveX;
      let finalY = centerY + moveY;

      if(finalX < 0) finalX = 0;
      if(finalX > area.clientWidth) finalX = area.clientWidth;
      if(finalY < 0) finalY = 0;
      if(finalY > area.clientHeight) finalY = area.clientHeight;

      dot.style.left = finalX + "px";
      dot.style.top = finalY + "px";
    }

    function setCenter(){
      baseX = smoothX;
      baseY = smoothY;
    }
  </script>

</body>
</html>
