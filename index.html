<!DOCTYPE html>
<html>
<head>
  <title>Right Click Back Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #box {
      border: 2px solid #fff;
      padding: 24px;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      font-size: 24px;
      line-height: 1.5;
    }

    .small {
      font-size: 16px;
      opacity: 0.8;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div id="box">
    Waiting for input...
    <div class="small">First tap once to arm the trap</div>
  </div>

  <script>
    const box = document.getElementById("box");
    let armed = false;
    let backCount = 0;

    function log(msg) {
      box.innerHTML = msg + `<div class="small">Back count: ${backCount}</div>`;
    }

    function fillHistoryTrap() {
      // Keep two fake states ahead so repeated back presses stay inside page
      history.pushState({ trap: 1, step: 1, t: Date.now() }, "", location.href);
      history.pushState({ trap: 1, step: 2, t: Date.now() + 1 }, "", location.href);
    }

    function armTrap() {
      if (armed) return;
      armed = true;
      fillHistoryTrap();
      log("Trap armed. Now try right click.");
    }

    // Left click / normal tap test
    document.addEventListener("click", () => {
      if (!armed) {
        armTrap();
      } else {
        log("LEFT CLICK DETECTED");
      }
    });

    // Right click/back detection
    window.addEventListener("popstate", () => {
      backCount++;
      log("RIGHT CLICK (BACK) DETECTED");

      // refill trap immediately
      setTimeout(() => {
        fillHistoryTrap();
      }, 0);
    });

    // Also arm on first touch/pointer/keydown in case browser wants interaction first
    ["touchstart", "pointerdown", "keydown"].forEach(evt => {
      window.addEventListener(evt, armTrap, { once: true });
    });
  </script>

</body>
</html>
