<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Click Detector</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        #status { border: 2px solid #0f0; padding: 20px; border-radius: 10px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="status">
        <p>TAP SCREEN TO ARM</p>
        <h1 id="counter">0</h1>
    </div>

    <script>
        let count = 0;

        // This function forces the browser to stay on the current "anchor"
        function reArm() {
            window.location.hash = "trap";
            window.location.hash = "!"; // Forces a change the browser must track
        }

        // Detect the back button via hash change
        window.onhashchange = function() {
            count++;
            document.getElementById('counter').innerText = count;
            
            // Immediately force the URL back to our "trap" anchor
            reArm();
        };

        // Initialize on first tap
        window.onclick = function() {
            reArm();
            document.querySelector('p').innerText = "TRAP ARMED: RIGHT-CLICK NOW";
        };

        // Backup: Standard popstate intercept
        window.onpopstate = function() {
            reArm();
        };
    </script>
</body>
</html>
