<!DOCTYPE html>
<html>
<head>
  <title>Hand Gesture 3D</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { Hands } from "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";

// VIDEO
const video = document.getElementById("video");

// CAMERA FIX (WORKING)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(err => {
  alert("Camera error: " + err);
});

// THREE SETUP
const scene = new THREE.Scene();
const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera3D.position.z = 5;

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0,1,1);
scene.add(light);

// STATE
let currentShape = "sphere";
let lastPalmTime = 0;
let lastPinch = false;

// CREATE SHAPE
function createShape(x, y) {
  let geometry;

  if(currentShape === "sphere"){
    geometry = new THREE.SphereGeometry(0.3, 32, 32);
  } else {
    geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  }

  const material = new THREE.MeshStandardMaterial({
    color: Math.random()*0xffffff
  });

  const mesh = new THREE.Mesh(geometry, material);

  mesh.position.set((x-0.5)*6, -(y-0.5)*6, 0);
  scene.add(mesh);
}

// MEDIAPIPE
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  if(results.multiHandLandmarks.length > 0){
    const lm = results.multiHandLandmarks[0];

    const thumb = lm[4];
    const index = lm[8];

    // PINCH
    const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
    const isPinch = dist < 0.05;

    if(isPinch && !lastPinch){
      createShape(index.x, index.y);
    }
    lastPinch = isPinch;

    // OPEN PALM
    const isOpenPalm =
      lm[8].y < lm[6].y &&
      lm[12].y < lm[10].y &&
      lm[16].y < lm[14].y &&
      lm[20].y < lm[18].y;

    if(isOpenPalm && Date.now() - lastPalmTime > 1500){
      currentShape = (currentShape === "sphere") ? "cube" : "sphere";
      console.log("Switched:", currentShape);
      lastPalmTime = Date.now();
    }
  }
});

// LOOP (IMPORTANT FIX)
async function detect(){
  if(video.readyState >= 2){
    await hands.send({ image: video });
  }
  requestAnimationFrame(detect);
}

// START AFTER VIDEO READY
video.onloadeddata = () => {
  detect();
};

// RENDER LOOP
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera3D);
}
animate();

</script>
</body>
</html>
