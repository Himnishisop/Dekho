<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back Trap Test</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
    }
    #box{
      border:2px solid #fff;
      border-radius:18px;
      padding:24px;
      max-width:520px;
      width:100%;
      font-size:26px;
      line-height:1.4;
    }
    .small{
      margin-top:12px;
      font-size:15px;
      opacity:.8;
    }
  </style>
</head>
<body>
  <div id="box">
    Tap once to arm
    <div class="small">Then try repeated right click</div>
  </div>

<script>
const box = document.getElementById("box");
let armed = false;
let count = 0;
const TRAP_HASH = "#trap-active";

function show(msg){
  box.innerHTML = msg + `<div class="small">Back count: ${count}</div>`;
}

function ensureTrap(){
  if (location.hash !== TRAP_HASH) {
    location.hash = TRAP_HASH;
  }
}

function arm(){
  if (armed) return;
  armed = true;

  // base + trap
  history.replaceState({base:true}, "", location.pathname + location.search);
  ensureTrap();

  // extra state for safety
  history.pushState({armed:true}, "", location.href);

  show("Trap armed. Try repeated right click.");
}

function onBackDetected(){
  count++;
  show("RIGHT CLICK / BACK DETECTED");

  // immediately restore trap
  setTimeout(() => {
    ensureTrap();
    history.pushState({armed:true, t:Date.now()}, "", location.href);
  }, 0);
}

window.addEventListener("hashchange", () => {
  if (!armed) return;

  // when back removes #trap-active
  if (location.hash !== TRAP_HASH) {
    onBackDetected();
  }
});

window.addEventListener("popstate", () => {
  if (!armed) return;
  onBackDetected();
});

document.addEventListener("click", () => {
  if (!armed) {
    arm();
  } else {
    show("LEFT CLICK DETECTED");
  }
});

["touchstart","pointerdown","keydown"].forEach(evt => {
  window.addEventListener(evt, arm, { once:true });
});
</script>
</body>
</html>
