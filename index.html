<!DOCTYPE html>
<html>
<head>
  <title>Tilt Pointer Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial,sans-serif;
      text-align:center;
      overflow:hidden;
    }
    button{
      margin:10px 6px;
      padding:12px 18px;
      font-size:16px;
      border:none;
      border-radius:10px;
    }
    #info{
      font-size:18px;
      margin-top:10px;
    }
    #area{
      position:relative;
      width:100vw;
      height:75vh;
      background:#222;
      overflow:hidden;
    }
    #center{
      position:absolute;
      width:12px;
      height:12px;
      background:white;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      opacity:0.4;
    }
    #dot{
      position:absolute;
      width:24px;
      height:24px;
      background:red;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }
  </style>
</head>
<body>

  <button onclick="startSensor()">Start</button>
  <button onclick="setCenter()">Set Center</button>

  <div id="info">x: 0 | y: 0</div>

  <div id="area">
    <div id="center"></div>
    <div id="dot"></div>
  </div>

  <script>
    let rawX = 0, rawY = 0;
    let smoothX = 0, smoothY = 0;

    let baseX = 0;
    let baseY = 3.0; // default forward tilt center

    let started = false;

    const alpha = 0.08;       // smoothing
    const sensitivity = 35;   // movement amount
    const deadzone = 0.15;    // ignore tiny shake

    const dot = document.getElementById("dot");
    const info = document.getElementById("info");
    const area = document.getElementById("area");

    function startSensor(){
      if(started) return;
      started = true;

      if(typeof DeviceMotionEvent.requestPermission === "function"){
        DeviceMotionEvent.requestPermission().then(response => {
          if(response === "granted"){
            window.addEventListener("devicemotion", handleMotion);
          }
        }).catch(() => {
          alert("Permission denied");
        });
      } else {
        window.addEventListener("devicemotion", handleMotion);
      }
    }

    function handleMotion(e){
      rawX = e.accelerationIncludingGravity.x || 0;
      rawY = e.accelerationIncludingGravity.y || 0;

      smoothX += (rawX - smoothX) * alpha;
      smoothY += (rawY - smoothY) * alpha;

      let dx = smoothX - baseX;
      let dy = smoothY - baseY;

      if (Math.abs(dx) < deadzone) dx = 0;
      if (Math.abs(dy) < deadzone) dy = 0;

      // X inverted so right tilt = right move
      let moveX = -dx * sensitivity;
      let moveY = dy * sensitivity;

      let finalX = area.clientWidth / 2 + moveX;
      let finalY = area.clientHeight / 2 + moveY;

      if(finalX < 12) finalX = 12;
      if(finalX > area.clientWidth - 12) finalX = area.clientWidth - 12;
      if(finalY < 12) finalY = 12;
      if(finalY > area.clientHeight - 12) finalY = area.clientHeight - 12;

      dot.style.left = finalX + "px";
      dot.style.top = finalY + "px";

      info.innerText = "x: " + dx.toFixed(2) + " | y: " + dy.toFixed(2);
    }

    function setCenter(){
      baseX = smoothX;
      baseY = smoothY;
    }
  </script>

</body>
</html>
