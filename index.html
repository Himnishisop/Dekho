<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuous Right Click Trap</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
    }
    #box{
      border:2px solid #fff;
      border-radius:18px;
      padding:24px;
      max-width:520px;
      width:100%;
      font-size:26px;
      line-height:1.4;
    }
    .small{
      margin-top:12px;
      font-size:15px;
      opacity:.8;
    }
  </style>
</head>
<body>
  <div id="box">
    Tap once to arm trap
    <div class="small">Then try repeated right clicks</div>
  </div>

  <script>
    const box = document.getElementById("box");
    let armed = false;
    let rightCount = 0;
    let fillLock = false;

    function show(msg){
      box.innerHTML = msg + `<div class="small">Right count: ${rightCount}</div>`;
    }

    function fillTrap(amount = 6){
      if (fillLock) return;
      fillLock = true;

      for(let i = 0; i < amount; i++){
        history.pushState(
          { trap: true, n: i, t: Date.now() + i },
          "",
          location.href
        );
      }

      setTimeout(() => {
        fillLock = false;
      }, 30);
    }

    function armTrap(){
      if (armed) return;
      armed = true;

      // make current page a controlled base state
      history.replaceState({ base: true }, "", location.href);

      // preload multiple fake states
      fillTrap(8);

      show("Trap armed. Keep right clicking.");
    }

    function refillSoon(){
      setTimeout(() => {
        fillTrap(4);
      }, 0);
    }

    window.addEventListener("popstate", (e) => {
      if (!armed) return;

      rightCount++;
      show("RIGHT CLICK DETECTED");

      // refill immediately after every back
      refillSoon();
    });

    // arm from first real interaction
    ["pointerdown", "touchstart", "click", "keydown"].forEach(evt => {
      window.addEventListener(evt, armTrap, { once: true });
    });

    // normal left click display
    document.addEventListener("click", () => {
      if (armed) {
        show("LEFT CLICK DETECTED");
      }
    });
  </script>
</body>
</html>
