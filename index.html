<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed Trap</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #counter { font-size: 5rem; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>

    <div id="counter">0</div>

    <script>
        let count = 0;
        const display = document.getElementById('counter');

        // Fast arming function
        function arm() {
            // Use a simple, short hash to minimize URL processing
            window.history.pushState(null, null, "#!");
        }

        // Initial arm
        arm();

        // High-speed intercept
        window.addEventListener('popstate', function() {
            // 1. Immediately re-arm (before doing anything else)
            arm();
            
            // 2. Run the logic
            count++;
            display.innerText = count;
            
            // 3. Optional: Add a tiny vibration if your phone supports it
            if (navigator.vibrate) navigator.vibrate(10); 
        });

        // Activate on first touch
        window.onclick = arm;
    </script>
</body>
</html>
