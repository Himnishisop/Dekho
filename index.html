<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popup Back Trap Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    #mainBox {
      border: 2px solid #fff;
      border-radius: 18px;
      padding: 24px;
      width: min(90vw, 520px);
      font-size: 26px;
      line-height: 1.4;
    }

    #small {
      font-size: 15px;
      opacity: 0.8;
      margin-top: 10px;
    }

    /* invisible popup */
    #ghostPopup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="mainBox">
    Tap once to start
    <div id="small">Then try repeated right click</div>
  </div>

  <div id="ghostPopup"></div>

  <script>
    const mainBox = document.getElementById("mainBox");
    const small = document.getElementById("small");
    const ghostPopup = document.getElementById("ghostPopup");

    let armed = false;
    let popupOpen = false;
    let count = 0;
    let reopening = false;

    function show(text, sub = "") {
      mainBox.innerHTML = `${text}<div id="small">${sub}</div>`;
    }

    function openPopup(push = true) {
      popupOpen = true;
      ghostPopup.style.display = "block";

      if (push) {
        history.pushState({ popup: "open", t: Date.now() }, "", location.href);
      }

      show("POPUP OPEN", `Back count: ${count}`);
    }

    function closePopup() {
      popupOpen = false;
      ghostPopup.style.display = "none";
      show("RIGHT CLICK DETECTED", `Back count: ${count}`);
    }

    function armSystem() {
      if (armed) return;
      armed = true;

      // clean base
      history.replaceState({ base: true }, "", location.href);

      // open first popup
      openPopup(true);

      show("SYSTEM ARMED", "Now try right click");
    }

    function handleBackSignal() {
      if (!armed) return;
      if (reopening) return;

      count++;
      closePopup();

      reopening = true;

      setTimeout(() => {
        openPopup(true);
        reopening = false;
      }, 10);
    }

    window.addEventListener("popstate", () => {
      handleBackSignal();
    });

    document.addEventListener("click", () => {
      if (!armed) {
        armSystem();
      } else {
        show("LEFT CLICK DETECTED", `Back count: ${count}`);
      }
    });

    ["touchstart", "pointerdown", "keydown"].forEach(evt => {
      window.addEventListener(evt, () => {
        if (!armed) armSystem();
      }, { once: true });
    });
  </script>

</body>
</html>
